version: "3.8"
services:
  mongo-db:
    image: mongo:4.4
    hostname: mongo-db
    container_name: db-mongo
    ports:
      - "27017:27017"
    command: --nojournal

  orion-ld:
    image: fiware/orion-ld:latest
    hostname: orion-ld
    container_name: fiware-orion-ld
    depends_on:
      - mongo-db
    ports:
      - "1026:1026"
    command: -dbhost mongo-db -logLevel DEBUG

  ld-context:
    image: httpd:alpine
    hostname: ld-context
    container_name: fiware-ld-context
    ports:
      - "3004:80"
    volumes:
      - ./data-models:/usr/local/apache2/htdocs/